<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#020e1c">
<title>NAUTILUS Score v1.6</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#020e1c;--card:#06182e;--border:#1a3a5c;
  --accent:#0af0ff;--gold:#ffaa00;--warn:#ff7a00;
  --danger:#ff2d2d;--safe:#00e676;--muted:#4a7a9b;
  --text:#c8dff0;--white:#e8f4ff;
}
html,body{min-height:100%;background:var(--bg);font-family:'DM Mono',monospace;color:var(--text)}
#nav{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:48px;background:rgba(2,14,28,0.97);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
#nav-logo{font-family:'Bebas Neue',cursive;font-size:1.4rem;color:var(--white);letter-spacing:0.12em}
#nav-logo span{color:var(--accent)}
#nav-ver{font-size:0.5rem;color:#fff;margin-left:8px}
#nav-back{font-size:0.6rem;color:var(--muted);text-decoration:none;letter-spacing:0.1em;border:1px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer}
#nav-back:hover{color:var(--accent);border-color:var(--accent)}
#content{padding:16px;max-width:900px;margin:0 auto}
.section-title{font-size:0.6rem;color:var(--accent);letter-spacing:0.15em;text-transform:uppercase;margin:20px 0 10px;border-bottom:1px solid var(--border);padding-bottom:6px}

/* Filter bar */
#filter-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;align-items:center}
.filter-label{font-size:0.55rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em}
.filter-btn{font-family:'DM Mono',monospace;font-size:0.55rem;padding:4px 10px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);cursor:pointer;transition:all 0.15s}
.filter-btn.active{color:var(--white);border-color:var(--white);background:rgba(255,255,255,0.08)}
.filter-btn.active-arome{color:var(--accent);border-color:var(--accent);background:rgba(10,240,255,0.1)}
.filter-btn.active-om{color:var(--gold);border-color:var(--gold);background:rgba(255,170,0,0.1)}

/* Station grid */
#station-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.st-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;transition:border-color 0.15s}
.st-card:hover{border-color:var(--accent)}
.st-card.active{border-color:var(--accent);background:rgba(10,240,255,0.04)}
.st-card.winner-arome{border-left:3px solid var(--accent)}
.st-card.winner-om{border-left:3px solid var(--gold)}
.st-card.winner-mixed{border-left:3px solid var(--warn)}
.st-name{font-size:0.75rem;color:var(--white);font-weight:bold;margin-bottom:6px}
.st-badges{display:flex;gap:6px;margin-bottom:8px;align-items:center}
.badge{font-size:0.5rem;padding:2px 7px;border-radius:4px;font-weight:bold;letter-spacing:0.06em;text-transform:uppercase}
.badge-arome{background:rgba(10,240,255,0.15);color:var(--accent);border:1px solid var(--accent)}
.badge-om{background:rgba(255,170,0,0.15);color:var(--gold);border:1px solid var(--gold)}
.badge-now{font-size:0.45rem;padding:1px 5px;border-radius:3px}
.badge-now-label{font-size:0.45rem;color:var(--muted);margin-right:2px}
.st-conditions{font-size:0.5rem;color:var(--white);margin-bottom:6px}
.st-bars{display:flex;flex-direction:column;gap:3px}
.bar-row{display:flex;align-items:center;gap:6px}
.bar-lbl{font-size:0.5rem;color:var(--muted);width:44px;text-align:right;flex-shrink:0}
.bar-track{flex:1;background:rgba(26,58,92,0.5);border-radius:2px;height:6px;overflow:hidden}
.bar-fill-om{background:var(--gold);height:100%;border-radius:2px}
.bar-fill-arome{background:var(--accent);height:100%;border-radius:2px}
.bar-val{font-size:0.5rem;width:32px;flex-shrink:0}
.st-n{font-size:0.45rem;color:var(--white);margin-top:4px}

/* Detail panel */
#detail{display:none;margin-top:16px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}
#detail.open{display:block}
#detail-title{font-size:0.9rem;color:var(--white);font-weight:bold;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
#detail-close{font-size:0.6rem;color:var(--muted);cursor:pointer;padding:4px 8px;border:1px solid var(--border);border-radius:6px}
#detail-close:hover{color:var(--accent)}

/* Matrix */
.matrix-wrap{overflow-x:auto;margin-top:12px}
.matrix-title{font-size:0.55rem;color:var(--accent);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px}
table.matrix{border-collapse:collapse;font-size:0.52rem;width:100%}
table.matrix th{padding:4px 6px;color:var(--muted);font-weight:normal;text-align:center;border-bottom:1px solid var(--border)}
table.matrix th.row-hdr{text-align:left}
table.matrix td{padding:4px 6px;text-align:center;border-radius:3px}
.cell-arome{background:rgba(10,240,255,0.12);border:1px solid rgba(10,240,255,0.3)}
.cell-om{background:rgba(255,170,0,0.12);border:1px solid rgba(255,170,0,0.3)}
.cell-empty{color:var(--border)}
.cell-lowdata{opacity:0.6}  /* n < 3 */
.cell-n{font-size:0.42rem;color:var(--white)}
.cell-n.low{color:var(--gold)}  /* n < 3 */

#loading{text-align:center;padding:60px 20px;color:var(--muted);font-size:0.7rem}
.spinner{display:inline-block;width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}

@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap');
</style>
</head>
<body>

<div id="nav">
  <div style="display:flex;align-items:center">
    <div id="nav-logo">NAUTI<span>LUS</span></div>
    <div id="nav-ver">score v1.6</div>
  </div>
  <a id="nav-back" href="#" onclick="event.preventDefault();var p=prompt('Password:');if(p==='mdi'){window.location.href='/?k=mdi'}">APP</a>
</div>

<div id="content">
  <div class="section-title">Model Score — OM vs AROME per condizione</div>

  <div id="filter-bar">
    <span class="filter-label">Vincitore:</span>
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">Tutte</button>
    <button class="filter-btn" data-filter="arome" onclick="setFilter('arome',this)">AROME</button>
    <button class="filter-btn" data-filter="om" onclick="setFilter('om',this)">OM</button>
  </div>

  <div id="condition-bar" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;align-items:center">
    <span class="filter-label">Settore:</span>
    <button class="filter-btn active" data-sec="all" onclick="setSector('all',this)">Tutti</button>
    <button class="filter-btn" data-sec="N" onclick="setSector('N',this)">N <span style="font-size:0.45rem;color:var(--muted)">(315-45°)</span></button>
    <button class="filter-btn" data-sec="E" onclick="setSector('E',this)">E <span style="font-size:0.45rem;color:var(--muted)">(45-135°)</span></button>
    <button class="filter-btn" data-sec="S" onclick="setSector('S',this)">S <span style="font-size:0.45rem;color:var(--muted)">(135-225°)</span></button>
    <button class="filter-btn" data-sec="W" onclick="setSector('W',this)">W <span style="font-size:0.45rem;color:var(--muted)">(225-315°)</span></button>
    <span style="margin-left:8px" class="filter-label">Fascia:</span>
    <button class="filter-btn active" data-spd="all" onclick="setSpeed('all',this)">Tutte</button>
    <button class="filter-btn" data-spd="low" onclick="setSpeed('low',this)">&lt;8 kt</button>
    <button class="filter-btn" data-spd="mid" onclick="setSpeed('mid',this)">8-15 kt</button>
    <button class="filter-btn" data-spd="high" onclick="setSpeed('high',this)">&gt;15 kt</button>
    <span style="margin-left:auto;font-size:0.5rem;color:var(--muted)" id="last-update"></span>
  </div>

  <div id="loading"><div class="spinner"></div><br>Caricamento score...</div>
  <div id="station-grid"></div>
  <div id="detail"></div>
</div>

<script>
var ENGINE_URL = '/api/engine';
var SECRET = 'mdi';
var N_THRESHOLD = 3;  // Sotto questa soglia i numeri appaiono in giallo
var allScores = {};
var currentFilter = 'all';
var currentSector = 'all';
var currentSpeed  = 'all';
var currentStation = null;

function setSector(s, btn) {
  currentSector = s;
  document.querySelectorAll('[data-sec]').forEach(function(b){ b.className = 'filter-btn'; });
  btn.className = 'filter-btn active';
  renderGrid();
}

function setSpeed(s, btn) {
  currentSpeed = s;
  document.querySelectorAll('[data-spd]').forEach(function(b){ b.className = 'filter-btn'; });
  btn.className = 'filter-btn active';
  renderGrid();
}

var STATION_NAMES = {
  livorno:'Livorno',canale_piombino:'Canale Piombino',viareggio:'Viareggio',
  capraia_w:'Capraia (MNW)',portoferraio:'Portoferraio',alberese:'Alberese',luri:'Luri (Corsica)',
  barcaggio:'Barcaggio',gorgona_cfr:'Gorgona CFR',capraia_cfr:'Capraia CFR',
  giglio_porto:'Giglio Porto',giglio_castello:'Giglio Castello',montecristo:'Montecristo',
  portoferraio_cfr:'Portoferraio CFR',orbetello:'Orbetello',svincenzo_porto:'S.Vincenzo Porto',
  casotto_pescatori:'Casotto P.',venturina:'Venturina',forte_dei_marmi:'Forte dei Marmi',
  lido_camaiore:'Lido Camaiore',bocca_arno_cfr:'Bocca Arno CFR',follonica:'Follonica',capalbio:'Capalbio'
};

var SPEED_LABELS = { low:'< 8 kt', mid:'8-15 kt', high:'> 15 kt' };
var SECTOR_LABELS = { N:'Nord', E:'Est', S:'Sud', W:'Ovest' };
var SLOT_LABELS = { morning:'Mattina', afternoon:'Pomeriggio' };

function conditionLabel(key) {
  if (!key) return '—';
  var parts = key.split('_');
  if (parts.length < 3) return key;
  var slot = parts[parts.length-1];
  var sec  = parts[parts.length-2];
  var spd  = parts.slice(0, parts.length-2).join('_');
  return (SPEED_LABELS[spd]||spd) + ' · ' + (SECTOR_LABELS[sec]||sec) + ' · ' + (SLOT_LABELS[slot]||slot);
}

async function load() {
  try {
    // Prima carica il summary di tutte le stazioni
    var r = await fetch(ENGINE_URL + '?action=score_get&k=' + SECRET);
    var d = await r.json();
    allScores = d.scores || {};
    var ts = new Date(d.generated_at);
    document.getElementById('last-update').textContent = 'Aggiornato ' + ts.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});

    // Poi carica le matrici complete in parallelo per tutte le stazioni
    var ids = Object.keys(allScores);
    var matrixResults = await Promise.all(ids.map(function(id){
      return fetch(ENGINE_URL + '?action=score_get&station=' + id + '&k=' + SECRET)
        .then(function(r){ return r.json(); })
        .then(function(d){ return { id: id, matrix: d.score ? d.score.matrix : null }; })
        .catch(function(){ return { id: id, matrix: null }; });
    }));
    matrixResults.forEach(function(res){
      if (allScores[res.id]) allScores[res.id].matrix = res.matrix;
    });

    document.getElementById('loading').style.display = 'none';
    renderGrid();
  } catch(e) {
    document.getElementById('loading').innerHTML = '<span style="color:var(--danger)">Errore caricamento: ' + e.message + '</span>';
  }
}

function isMixed(s) {
  return s.global_best !== s.current_best && s.current_best !== null;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('[data-filter]').forEach(function(b){ b.className = 'filter-btn'; });
  btn.className = 'filter-btn active' + (f === 'arome' ? ' active-arome' : f === 'om' ? ' active-om' : '');
  renderGrid();
}

function getConditionBest(s, sector, speed) {
  // Se non ci sono filtri condizione attivi, usa global
  if (sector === 'all' && speed === 'all') return { best: s.global_best, n: s.n_total, isFiltered: false };
  if (!s.matrix) return { best: null, n: 0, isFiltered: true };

  // Aggrega MAE su tutte le combinazioni che matchano i filtri
  var speeds  = speed  === 'all' ? ['low','mid','high'] : [speed];
  var sectors = sector === 'all' ? ['N','E','S','W']    : [sector];
  var slots   = ['morning','afternoon'];

  var sumOm = 0, sumAr = 0, countOm = 0, countAr = 0, nTotal = 0;
  speeds.forEach(function(spd) {
    sectors.forEach(function(sec) {
      slots.forEach(function(slot) {
        var cell = s.matrix[spd + '_' + sec + '_' + slot];
        if (!cell) return;
        nTotal += cell.n;
        if (cell.mae_om    !== null) { sumOm += cell.mae_om    * cell.n; countOm += cell.n; }
        if (cell.mae_arome !== null) { sumAr += cell.mae_arome * cell.n; countAr += cell.n; }
      });
    });
  });

  if (countOm === 0 && countAr === 0) return { best: null, n: 0, isFiltered: true };
  var avgOm = countOm > 0 ? sumOm / countOm : null;
  var avgAr = countAr > 0 ? sumAr / countAr : null;
  var best = (avgOm !== null && avgAr !== null) ? (avgAr < avgOm ? 'arome' : 'om') :
             avgOm !== null ? 'om' : 'arome';
  return { best: best, n: nTotal, mae_om: avgOm ? Math.round(avgOm*100)/100 : null, mae_arome: avgAr ? Math.round(avgAr*100)/100 : null, isFiltered: true };
}

function renderGrid() {
  var ids = Object.keys(allScores);
  var isCondFiltered = currentSector !== 'all' || currentSpeed !== 'all';

  // Per ogni stazione, calcola il best nelle condizioni filtrate
  var stationBest = {};
  ids.forEach(function(id){
    stationBest[id] = getConditionBest(allScores[id], currentSector, currentSpeed);
  });

  ids.sort(function(a,b){
    var sa = allScores[a], sb = allScores[b];
    var ba = stationBest[a], bb = stationBest[b];
    var ma = !isCondFiltered && isMixed(sa), mb = !isCondFiltered && isMixed(sb);
    if (ma && !mb) return -1;
    if (!ma && mb) return 1;
    var advA = sa.global_mae_om && sa.global_mae_arome ? Math.abs(sa.global_mae_om - sa.global_mae_arome) : 0;
    var advB = sb.global_mae_om && sb.global_mae_arome ? Math.abs(sb.global_mae_om - sb.global_mae_arome) : 0;
    return advB - advA;
  });

  if (currentFilter !== 'all') {
    ids = ids.filter(function(id){
      var best = stationBest[id].best;
      var s = allScores[id];
      if (currentFilter === 'mixed') return !isCondFiltered && isMixed(s);
      if (currentFilter === 'arome') return best === 'arome';
      if (currentFilter === 'om')    return best === 'om';
      return true;
    });
  }

  var maxMae = 0;
  ids.forEach(function(id){
    var s = allScores[id];
    if (s.global_mae_om > maxMae) maxMae = s.global_mae_om;
    if (s.global_mae_arome > maxMae) maxMae = s.global_mae_arome;
  });

  var html = '';
  ids.forEach(function(id){
    var s = allScores[id];
    var cb = stationBest[id];
    var name = STATION_NAMES[id] || id;
    var mixed = !isCondFiltered && isMixed(s);
    var displayBest = cb.best || s.global_best;
    var cardClass = 'st-card ' + (mixed ? 'winner-mixed' : displayBest === 'arome' ? 'winner-arome' : 'winner-om');
    if (currentStation === id) cardClass += ' active';

    var globalBadge = displayBest === 'arome'
      ? '<span class="badge badge-arome">' + (isCondFiltered ? 'AROME' : 'AROME globale') + '</span>'
      : '<span class="badge badge-om">' + (isCondFiltered ? 'OM' : 'OM globale') + '</span>';

    var nowBadge = '';
    if (!isCondFiltered) {
      if (s.current_best && s.current_best !== s.global_best) {
        nowBadge = s.current_best === 'arome'
          ? '<span class="badge-now-label">ora</span><span class="badge badge-now badge-arome">AROME</span>'
          : '<span class="badge-now-label">ora</span><span class="badge badge-now badge-om">OM</span>';
      } else if (s.current_best) {
        nowBadge = '<span class="badge-now-label" style="color:var(--safe)">✓ coerente</span>';
      }
    } else {
      nowBadge = '<span style="font-size:0.45rem;color:var(--white)">n=' + cb.n + '</span>';
    }

    // MAE da mostrare: filtrato se condizione attiva, globale altrimenti
    // Se filtro condizione attivo e n=0, non usare i valori globali come fallback
    var noData = isCondFiltered && cb.n === 0;
    var maeOm  = noData ? null : (isCondFiltered && cb.mae_om    !== undefined ? cb.mae_om    : s.global_mae_om);
    var maeAr  = noData ? null : (isCondFiltered && cb.mae_arome !== undefined ? cb.mae_arome : s.global_mae_arome);
    var omPct  = maxMae > 0 && maeOm  ? Math.round(maeOm  / maxMae * 100) : 0;
    var arPct  = maxMae > 0 && maeAr  ? Math.round(maeAr  / maxMae * 100) : 0;
    var omCol  = displayBest === 'om'    ? 'var(--gold)'   : 'var(--white)';
    var arCol  = displayBest === 'arome' ? 'var(--accent)' : 'var(--white)';

    var condLabel = isCondFiltered
      ? (currentSector !== 'all' ? SECTOR_LABELS[currentSector] : 'Tutti') + ' · ' + (currentSpeed !== 'all' ? SPEED_LABELS[currentSpeed] : 'Tutte le fasce')
      : conditionLabel(s.current_conditions);

    html += '<div class="' + cardClass + '" onclick="showDetail(\'' + id + '\')">';
    html += '<div class="st-name">' + name + '</div>';
    html += '<div class="st-badges">' + globalBadge + '<span style="flex:1"></span>' + nowBadge + '</div>';
    html += '<div class="st-conditions">' + condLabel + '</div>';
    html += '<div class="st-bars">';
    html += '<div class="bar-row"><span class="bar-lbl" style="color:var(--gold)">OM</span><div class="bar-track"><div class="bar-fill-om" style="width:' + omPct + '%"></div></div><span class="bar-val" style="color:' + omCol + '">' + (maeOm||'—') + '</span></div>';
    html += '<div class="bar-row"><span class="bar-lbl" style="color:var(--accent)">AROME</span><div class="bar-track"><div class="bar-fill-arome" style="width:' + arPct + '%"></div></div><span class="bar-val" style="color:' + arCol + '">' + (maeAr||'—') + '</span></div>';
    html += '</div>';
    html += '<div class="st-n">n totale: ' + s.n_total + '</div>';
    html += '</div>';
  });

  document.getElementById('station-grid').innerHTML = html || '<div style="font-family:DM Mono,monospace;font-size:0.6rem;color:var(--muted)">Nessuna stazione corrisponde ai filtri.</div>';
}

function showDetail(id) {
  currentStation = id;
  renderGrid(); // aggiorna active state

  // Fetch score completo con matrice
  var det = document.getElementById('detail');
  det.innerHTML = '<div style="text-align:center;padding:20px;color:var(--muted);font-size:0.6rem">Caricamento matrice...</div>';
  det.classList.add('open');
  det.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  fetch(ENGINE_URL + '?action=score_get&station=' + id + '&k=' + SECRET)
    .then(function(r){ return r.json(); })
    .then(function(d){ renderDetail(id, d.score); })
    .catch(function(e){ det.innerHTML = '<span style="color:var(--danger)">Errore: ' + e.message + '</span>'; });
}

function renderDetail(id, score) {
  var det = document.getElementById('detail');
  if (!score) { det.innerHTML = '<span style="color:var(--muted)">Nessun dato disponibile</span>'; return; }

  var name = STATION_NAMES[id] || id;
  var speeds  = ['low','mid','high'];
  var sectors = ['N','E','S','W'];
  var slots   = ['morning','afternoon'];

  var html = '<div id="detail-title"><span>' + name + ' — Matrice score per condizione</span><span id="detail-close" onclick="closeDetail()">✕ chiudi</span></div>';

  slots.forEach(function(slot) {
    html += '<div class="matrix-wrap">';
    html += '<div class="matrix-title">' + SLOT_LABELS[slot] + '</div>';
    html += '<table class="matrix">';
    html += '<thead><tr><th class="row-hdr">Velocità</th>';
    sectors.forEach(function(sec){ html += '<th>' + SECTOR_LABELS[sec] + '</th>'; });
    html += '</tr></thead><tbody>';

    speeds.forEach(function(spd) {
      html += '<tr><td style="color:var(--text);text-align:left;padding:4px 6px">' + SPEED_LABELS[spd] + '</td>';
      sectors.forEach(function(sec) {
        var key = spd + '_' + sec + '_' + slot;
        var cell = score.matrix && score.matrix[key];
        if (!cell || cell.n === 0) {
          html += '<td class="cell-empty">—</td>';
          return;
        }
        var isLow = cell.n < N_THRESHOLD;
        var cellClass = 'cell-' + (cell.best || 'empty') + (isLow ? ' cell-lowdata' : '');
        var omStr  = cell.mae_om    !== null ? cell.mae_om    : '—';
        var arStr  = cell.mae_arome !== null ? cell.mae_arome : '—';
        var nClass = isLow ? 'cell-n low' : 'cell-n';
        var omColor  = cell.best === 'om'    ? 'var(--gold)'   : 'var(--white)';
        var arColor  = cell.best === 'arome' ? 'var(--accent)' : 'var(--white)';
        html += '<td class="' + cellClass + '">';
        html += '<span style="color:' + omColor + '">' + omStr + '</span>';
        html += '<span style="color:var(--white)"> / </span>';
        html += '<span style="color:' + arColor + '">' + arStr + '</span>';
        html += '<div class="' + nClass + '">n=' + cell.n + '</div>';
        html += '</td>';
      });
      html += '</tr>';
    });

    html += '</tbody></table>';
    html += '<div style="font-size:0.48rem;color:var(--muted);margin-top:4px">Ambra=MAE OM · Ciano=MAE AROME · sfondo colorato=vincitore · n giallo=dati scarsi (n&lt;' + N_THRESHOLD + ')</div>';
    html += '</div>';
  });

  det.innerHTML = html;
}

function closeDetail() {
  currentStation = null;
  document.getElementById('detail').classList.remove('open');
  renderGrid();
}

load();
</script>
</body>
</html>
