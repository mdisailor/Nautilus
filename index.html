<style>
:root {
  --bg:      #020c18;
  --deep:    #040f20;
  --surface: #071828;
  --card:    #0a2035;
  --border:  #0e3050;
  --accent:  #0af0ff;
  --gold:    #f0b429;
  --danger:  #ff4444;
  --safe:    #22dd88;
  --warn:    #ffaa00;
  --text:    #c8dff0;
  --muted:   #7aaac0;
  --white:   #eaf4ff;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { font-size: 144%; }
html, body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 80% 40% at 50% -10%, rgba(0,160,220,0.12) 0%, transparent 60%), radial-gradient(ellipse 60% 30% at 80% 110%, rgba(0,80,160,0.08) 0%, transparent 50%); pointer-events: none; z-index: 0; }
.ocean-bg { position: fixed; bottom: 0; left: 0; right: 0; height: 30vh; pointer-events: none; z-index: 0; opacity: 0.05; overflow: hidden; }
.wave { position: absolute; width: 200%; height: 80px; background: repeating-linear-gradient(90deg, transparent 0px, transparent 40px, rgba(0,240,255,0.5) 40px, rgba(0,240,255,0.5) 42px); }
.wave:nth-child(1) { bottom: 15px; animation: wavemove 8s linear infinite; }
.wave:nth-child(2) { bottom: 35px; animation: wavemove 13s linear infinite reverse; opacity: 0.6; }
.wave:nth-child(3) { bottom: 55px; animation: wavemove 18s linear infinite; opacity: 0.35; }
@keyframes wavemove { from{transform:translateX(0)} to{transform:translateX(-50%)} }
@keyframes spin { to { transform: rotate(360deg); } }

#app { position: relative; z-index: 1; max-width: 780px; margin: 0 auto; padding: 0 0 90px; min-height: 100vh; }

/* NAV */
.nav-tabs { display: flex; background: var(--deep); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; }
.nav-tab { flex: 1; padding: 12px 4px; text-align: center; font-family: 'DM Mono', monospace; font-size: 0.58rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
.nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.page { display: none; }
.page.active { display: block; }

/* HEADER */
header { padding: 20px 20px 0; display: flex; align-items: flex-start; justify-content: space-between; }
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 2.4rem; letter-spacing: 0.12em; color: var(--white); line-height: 1; }
.logo span { color: var(--accent); }
.logo-sub { font-family: 'DM Mono', monospace; font-size: 0.55rem; letter-spacing: 0.18em; color: #8ab8d0; text-transform: uppercase; margin-top: 2px; }
#clock { font-family: 'DM Mono', monospace; font-size: 1.3rem; color: var(--accent); text-align: right; }
#date-display { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px; text-align: right; }

/* LOCATION */
