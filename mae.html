<!-- NAUTILUS MAE COMPARE v1.3 - mdisailor - 2026-06-24 -->
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#020e1c">
<title>NAUTILUS MAE Compare v1.8</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#020e1c; --card:#06182e; --border:#1a3a5c;
  --accent:#0af0ff; --gold:#ffaa00; --warn:#ff7a00;
  --danger:#ff2d2d; --safe:#00e676; --muted:#4a7a9b;
  --text:#c8dff0; --white:#e8f4ff;
}
html,body{min-height:100%;background:var(--bg);font-family:'DM Mono',monospace;color:var(--text)}
#nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;height:48px;
  background:rgba(2,14,28,0.97);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
}
#nav-logo{font-family:'Bebas Neue',cursive;font-size:1.4rem;color:var(--white);letter-spacing:0.12em}
#nav-logo span{color:var(--accent)}
#nav-ver{font-size:0.5rem;color:#fff;margin-left:8px}
#nav-back{font-size:0.6rem;color:var(--muted);text-decoration:none;letter-spacing:0.1em;border:1px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer}
#nav-back:hover{color:var(--accent);border-color:var(--accent)}

/* Layout principale: lista a sinistra, dettaglio a destra su schermi larghi */
#layout{display:flex;gap:0;align-items:flex-start}
#content{padding:16px;flex:1;min-width:0}
#detail-sidebar{
  display:none;width:360px;flex-shrink:0;
  position:sticky;top:48px;max-height:calc(100vh - 48px);
  overflow-y:auto;padding:16px;
  background:var(--card);border-left:2px solid var(--border);
}
#detail-sidebar.open{display:block}

.section-title{
  font-size:0.6rem;color:var(--accent);letter-spacing:0.15em;text-transform:uppercase;
  margin:20px 0 10px;border-bottom:1px solid var(--border);padding-bottom:6px;
}

/* Summary cards */
#summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px}
.sum-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.sum-card .sum-val{font-size:1.6rem;font-weight:bold;margin:4px 0}
.sum-card .sum-label{font-size:0.55rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em}
.sum-card .sum-sub{font-size:0.6rem;color:var(--text);margin-top:2px}

/* Station list */
#station-list{display:flex;flex-direction:column;gap:6px}
.st-row{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;transition:border-color 0.15s}
.st-row:hover{border-color:var(--accent)}
.st-row.active{border-color:var(--accent);background:rgba(10,240,255,0.05)}
.st-row.winner-arome{border-left:3px solid var(--accent)}
.st-row.winner-om{border-left:3px solid var(--gold)}
.st-row.winner-tie{border-left:3px solid var(--muted)}
.st-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.st-name{font-size:0.75rem;color:var(--white);font-weight:bold}
.st-n{font-size:0.55rem;color:var(--muted)}
.winner-badge{font-size:0.55rem;letter-spacing:0.08em;text-transform:uppercase;padding:2px 8px;border-radius:4px;font-weight:bold}
.badge-arome{background:rgba(10,240,255,0.15);color:var(--accent);border:1px solid var(--accent)}
.badge-om{background:rgba(255,170,0,0.15);color:var(--gold);border:1px solid var(--gold)}
.badge-tie{background:rgba(74,122,155,0.2);color:var(--muted);border:1px solid var(--muted)}
.badge-nodata{background:rgba(74,122,155,0.1);color:var(--muted);border:1px solid var(--border)}
.st-bars{display:flex;flex-direction:column;gap:4px}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-label{font-size:0.55rem;color:var(--muted);width:50px;text-align:right;flex-shrink:0}
.bar-track{flex:1;background:rgba(26,58,92,0.5);border-radius:3px;height:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width 0.4s}
.bar-fill-om{background:var(--gold)}
.bar-fill-arome{background:var(--accent)}
.bar-val{font-size:0.6rem;width:36px;flex-shrink:0}

/* Detail panel — mobile: overlay in basso scorrevole */
#detail-mobile{
  display:none;position:fixed;bottom:0;left:0;right:0;
  background:var(--card);border-top:2px solid var(--border);
  padding:16px;height:60vh;overflow-y:auto;z-index:200;
}
#detail-mobile.open{display:block}
#detail-close-mobile{
  position:absolute;top:10px;right:14px;font-size:0.7rem;
  color:var(--muted);cursor:pointer;padding:4px 8px;
}
#detail-close-mobile:hover{color:var(--accent)}

/* Detail card style — font più grande */
.detail-title{font-size:1rem;color:var(--white);margin-bottom:12px;font-weight:bold}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.detail-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center}
.detail-card .dc-label{font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px}
.detail-card .dc-val{font-size:1.4rem;font-weight:bold;margin:4px 0}
.detail-card .dc-sub{font-size:0.65rem;color:var(--muted)}

/* States */
#loading{text-align:center;padding:60px 20px;color:var(--muted);font-size:0.7rem}
#error{text-align:center;padding:40px 20px;color:var(--danger);font-size:0.7rem}
.spinner{display:inline-block;width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Su schermi larghi (≥700px) usa sidebar, nascondi mobile overlay */
@media (min-width:700px){
  #detail-mobile{display:none !important}
  #layout{align-items:flex-start}
}
/* Su mobile (< 700px) nascondi sidebar, usa overlay */
@media (max-width:699px){
  #detail-sidebar{display:none !important}
}

@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap');
</style>
</head>
<body>

<div id="nav">
  <div style="display:flex;align-items:center">
    <div id="nav-logo">NAUTI<span>LUS</span></div>
    <div id="nav-ver">mae v1.8</div>
  </div>
  <a id="nav-back" href="#" onclick="event.preventDefault();var p=prompt('Password:');if(p==='mdi'){window.location.href='/?k=mdi'}">APP</a>
</div>

<div id="layout">
<div id="content">
  <div class="section-title">Confronto MAE — OM vs AROME</div>

  <div id="summary" style="display:none">
    <div class="sum-card">
      <div class="sum-label">Vince AROME</div>
      <div class="sum-val" id="sum-arome" style="color:var(--accent)">—</div>
      <div class="sum-sub">stazioni</div>
    </div>
    <div class="sum-card">
      <div class="sum-label">Vince OM</div>
      <div class="sum-val" id="sum-om" style="color:var(--gold)">—</div>
      <div class="sum-sub">stazioni</div>
    </div>
    <div class="sum-card">
      <div class="sum-label">MAE medio</div>
      <div class="sum-val" id="sum-mae" style="color:var(--text);font-size:1rem">—</div>
      <div class="sum-sub">OM / AROME (kn)</div>
    </div>
  </div>

  <div id="loading">
    <div class="spinner"></div><br>
    Caricamento campioni...
  </div>
  <div id="error" style="display:none"></div>
  <div id="station-list"></div>

  <div class="section-title" style="margin-top:24px">Osservazioni Manuali</div>
  <div id="obs-summary" style="display:none;margin-bottom:12px">
    <div class="sum-card" style="display:inline-block;padding:10px 16px;margin-right:8px">
      <div class="sum-label">Totale osservazioni</div>
      <div class="sum-val" id="obs-count" style="color:var(--accent)">—</div>
    </div>
    <div class="sum-card" style="display:inline-block;padding:10px 16px;margin-right:8px">
      <div class="sum-label">Osservatori attivi</div>
      <div class="sum-val" id="obs-pins" style="color:var(--gold)">—</div>
    </div>
  </div>
  <div id="obs-list"><div style="font-family:DM Mono,monospace;font-size:0.6rem;color:var(--muted)">Caricamento osservazioni...</div></div>
</div><!-- fine #content -->

<!-- Sidebar dettaglio (desktop ≥700px) -->
<div id="detail-sidebar">
  <div style="display:flex;justify-content:flex-end;margin-bottom:8px">
    <span onclick="closeDetail()" style="font-size:0.65rem;color:var(--muted);cursor:pointer;padding:4px 8px;border:1px solid var(--border);border-radius:6px">✕ chiudi</span>
  </div>
  <div id="detail-content-sidebar"></div>
</div>

</div><!-- fine #layout -->

<!-- Overlay dettaglio (mobile <700px) -->
<div id="detail-mobile">
  <span id="detail-close-mobile" onclick="closeDetail()">✕ chiudi</span>
  <div id="detail-content-mobile"></div>
</div>

<script>
var ENGINE_URL = '/api/engine';
var SECRET = 'mdi';

var STATION_NAMES = {
  livorno:'Livorno', canale_piombino:'Canale Piombino', viareggio:'Viareggio',
  capraia_w:'Capraia (MNW)', portoferraio:'Portoferraio', alberese:'Alberese', luri:'Luri (Corsica)',
  barcaggio:'Barcaggio', bonifacio_pertusato:'Cap Pertusato', vada:'Vada',
  gorgona_cfr:'Gorgona CFR', capraia_cfr:'Capraia CFR', giglio_porto:'Giglio Porto',
  giglio_castello:'Giglio Castello', montecristo:'Montecristo', portoferraio_cfr:'Portoferraio CFR',
  orbetello:'Orbetello', svincenzo_porto:'S.Vincenzo Porto', casotto_pescatori:'Casotto P.',
  venturina:'Venturina', forte_dei_marmi:'Forte dei Marmi', lido_camaiore:'Lido Camaiore',
  bocca_arno_cfr:'Bocca Arno CFR', follonica:'Follonica', capalbio:'Capalbio'
};

var lastData = null;

async function load() {
  try {
    var r = await fetch(ENGINE_URL + '?action=mae_compare&k=' + SECRET);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    var data = await r.json();
    if (data.error) throw new Error(data.error);
    lastData = data;
    render(data);
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    var err = document.getElementById('error');
    err.style.display = 'block';
    err.textContent = 'Errore: ' + e.message;
  }
}

function render(data) {
  document.getElementById('loading').style.display = 'none';

  var stations = data.stations;
  var ids = Object.keys(stations).filter(function(id){ return stations[id] !== null; });
  var withBoth = ids.filter(function(id){
    var s = stations[id];
    return s && s.mae_om !== null && s.mae_arome !== null;
  });

  // Summary
  var nArome = withBoth.filter(function(id){ return stations[id].winner === 'arome'; }).length;
  var nOm = withBoth.filter(function(id){ return stations[id].winner === 'om'; }).length;
  var avgMaeOm = withBoth.length > 0
    ? (withBoth.reduce(function(a,id){ return a + stations[id].mae_om; }, 0) / withBoth.length).toFixed(2) : '—';
  var avgMaeArome = withBoth.length > 0
    ? (withBoth.reduce(function(a,id){ return a + stations[id].mae_arome; }, 0) / withBoth.length).toFixed(2) : '—';

  document.getElementById('sum-arome').textContent = nArome;
  document.getElementById('sum-om').textContent = nOm;
  document.getElementById('sum-mae').textContent = avgMaeOm + ' / ' + avgMaeArome;
  document.getElementById('summary').style.display = 'grid';

  // Ordina: prima quelle con dati completi (entrambi MAE), poi quelle con solo OM, poi null
  var sorted = Object.keys(stations).sort(function(a, b) {
    var sa = stations[a], sb = stations[b];
    if (!sa && !sb) return 0;
    if (!sa) return 1;
    if (!sb) return -1;
    var aHasBoth = sa.mae_om !== null && sa.mae_arome !== null;
    var bHasBoth = sb.mae_om !== null && sb.mae_arome !== null;
    if (aHasBoth && !bHasBoth) return -1;
    if (!aHasBoth && bHasBoth) return 1;
    // Entrambi con dati: ordina per differenza MAE (chi ha differenza maggiore per primo — più interessante)
    if (aHasBoth && bHasBoth) {
      return Math.abs(sb.mae_om - sb.mae_arome) - Math.abs(sa.mae_om - sa.mae_arome);
    }
    return 0;
  });

  // Max MAE per scala barre
  var maxMae = 0;
  sorted.forEach(function(id) {
    var s = stations[id];
    if (!s) return;
    if (s.mae_om && s.mae_om > maxMae) maxMae = s.mae_om;
    if (s.mae_arome && s.mae_arome > maxMae) maxMae = s.mae_arome;
  });
  if (maxMae === 0) maxMae = 1;

  var html = '';
  sorted.forEach(function(id) {
    var s = stations[id];
    var name = STATION_NAMES[id] || id;
    if (!s) return;

    var winnerClass = s.winner ? 'winner-' + s.winner : '';
    var badge = '';
    if (s.winner === 'arome') badge = '<span class="winner-badge badge-arome">AROME migliore</span>';
    else if (s.winner === 'om') badge = '<span class="winner-badge badge-om">OM migliore</span>';
    else if (s.winner === 'tie') badge = '<span class="winner-badge badge-tie">Pari</span>';
    else badge = '<span class="winner-badge badge-nodata">Solo OM</span>';

    var omPct = s.mae_om !== null ? Math.round(s.mae_om / maxMae * 100) : 0;
    var aromePct = s.mae_arome !== null ? Math.round(s.mae_arome / maxMae * 100) : 0;

    var omColor = s.winner === 'om' ? 'var(--gold)' : 'var(--text)';
    var aromeColor = s.winner === 'arome' ? 'var(--accent)' : 'var(--text)';

    html += '<div class="st-row ' + winnerClass + '" data-id="' + id + '" onclick="showDetail(\'' + id + '\')">';
    html += '<div class="st-header">';
    html += '<div><span class="st-name">' + name + '</span> <span class="st-n">n=' + s.n + '</span></div>';
    html += badge;
    html += '</div>';
    html += '<div class="st-bars">';
    // Barra OM
    html += '<div class="bar-row">';
    html += '<div class="bar-label" style="color:var(--gold)">OM</div>';
    html += '<div class="bar-track"><div class="bar-fill bar-fill-om" style="width:' + omPct + '%"></div></div>';
    html += '<div class="bar-val" style="color:' + omColor + '">' + (s.mae_om !== null ? s.mae_om + ' kn' : '—') + '</div>';
    html += '</div>';
    // Barra AROME
    html += '<div class="bar-row">';
    html += '<div class="bar-label" style="color:var(--accent)">AROME</div>';
    html += '<div class="bar-track"><div class="bar-fill bar-fill-arome" style="width:' + aromePct + '%"></div></div>';
    html += '<div class="bar-val" style="color:' + aromeColor + '">' + (s.mae_arome !== null ? s.mae_arome + ' kn' : '—') + '</div>';
    html += '</div>';
    html += '</div>';
    html += '</div>';
  });

  document.getElementById('station-list').innerHTML = html;
}

function showDetail(id) {
  if (!lastData || !lastData.stations[id]) return;
  var s = lastData.stations[id];
  var name = STATION_NAMES[id] || id;
  var diff = (s.mae_om !== null && s.mae_arome !== null)
    ? Math.round((s.mae_om - s.mae_arome) * 100) / 100 : null;
  var diffStr = diff !== null ? (diff > 0 ? '+' + diff : '' + diff) + ' kn' : '—';
  var diffColor = diff !== null ? (diff > 0 ? 'var(--accent)' : diff < 0 ? 'var(--gold)' : 'var(--muted)') : 'var(--muted)';
  var diffWinner = diff !== null ? (diff > 0 ? 'AROME più preciso di OM di' : diff < 0 ? 'OM più preciso di AROME di' : 'Pari') : 'Confronto non disponibile';

  var html = '<div class="detail-title">' + name + '</div>';
  html += '<div class="detail-grid">';
  html += '<div class="detail-card"><div class="dc-label">MAE OM</div><div class="dc-val" style="color:var(--gold)">' + (s.mae_om !== null ? s.mae_om : '—') + '</div><div class="dc-sub">kn · n=' + s.n_om + '</div></div>';
  html += '<div class="detail-card"><div class="dc-label">MAE AROME</div><div class="dc-val" style="color:var(--accent)">' + (s.mae_arome !== null ? s.mae_arome : '—') + '</div><div class="dc-sub">kn · n=' + s.n_arome + '</div></div>';
  html += '<div class="detail-card"><div class="dc-label">Bias OM</div><div class="dc-val" style="color:var(--text);font-size:0.9rem">' + (s.bias_om !== null ? s.bias_om : '—') + '</div><div class="dc-sub">kn (stazione - OM)</div></div>';
  html += '<div class="detail-card"><div class="dc-label">Bias AROME</div><div class="dc-val" style="color:var(--text);font-size:0.9rem">' + (s.bias_arome !== null ? s.bias_arome : '—') + '</div><div class="dc-sub">kn (stazione - AROME)</div></div>';
  html += '<div class="detail-card" style="grid-column:1/-1"><div class="dc-label">' + diffWinner + '</div><div class="dc-val" style="color:' + diffColor + ';font-size:1rem">' + (diff !== null ? Math.abs(diff) + ' kn' : '—') + '</div><div class="dc-sub">campioni totali: ' + s.n + '</div></div>';
  html += '</div>';

  var matrixElId = 'matrix-' + id + '-' + Date.now();
  // Matrice stratificata — carica campioni grezzi e calcola
  html += '<div style="font-family:DM Mono,monospace;font-size:0.55rem;color:var(--accent);letter-spacing:0.1em;text-transform:uppercase;margin:14px 0 6px;border-top:1px solid var(--border);padding-top:10px">Matrice MAE per velocit\u00e0 \u00d7 settore</div>';
  html += '<div id="' + matrixElId + '" style="font-size:0.55rem;color:var(--muted)">Caricamento...</div>';

  // Mostra nel container giusto in base alla viewport
  var isMobile = window.innerWidth < 700;
  if (isMobile) {
    document.getElementById('detail-content-mobile').innerHTML = html;
    document.getElementById('detail-mobile').classList.add('open');
  } else {
    document.getElementById('detail-content-sidebar').innerHTML = html;
    document.getElementById('detail-sidebar').classList.add('open');
  }
  document.querySelectorAll('.st-row').forEach(function(r){ r.classList.remove('active'); });
  var activeRow = document.querySelector('.st-row[data-id="' + id + '"]');
  if (activeRow) activeRow.classList.add('active');

  // Fetch campioni grezzi per matrice
  fetch(ENGINE_URL + '?action=bias_history&station=' + id + '&limit=100&k=' + SECRET)
    .then(function(r){ return r.json(); })
    .then(function(data){ renderMatrix(matrixElId, data.samples || []); })
    .catch(function(e){ console.error('Matrix fetch error:', e); var el = document.getElementById(matrixElId); if(el) el.textContent = 'Errore: ' + (e.message || e); });
}

function closeDetail() {
  document.getElementById('detail-mobile').classList.remove('open');
  document.getElementById('detail-sidebar').classList.remove('open');
  document.querySelectorAll('.st-row').forEach(function(r){ r.classList.remove('active'); });
}

function renderMatrix(elId, samples) {
  var el = document.getElementById(elId);
  if (!el) return;

  var speeds = [
    { label: '<8 kt',   min: 0,  max: 8   },
    { label: '8-15 kt', min: 8,  max: 15  },
    { label: '>15 kt',  min: 15, max: 999 }
  ];
  var sectors = [
    { label: 'N',  min: 315, max: 360, min2: 0,    max2: 45  },
    { label: 'E',  min: 45,  max: 135, min2: null              },
    { label: 'S',  min: 135, max: 225, min2: null              },
    { label: 'W',  min: 225, max: 315, min2: null              }
  ];

  function inSector(dir, sec) {
    if (dir === null || dir === undefined) return false;
    if (sec.min2 !== null) return (dir >= sec.min && dir <= 360) || (dir >= 0 && dir <= sec.max2);
    return dir >= sec.min && dir < sec.max;
  }

  function cellMAE(spd, sec) {
    var filtered = samples.filter(function(s) {
      if (!s.om || s.om.wind_kt === null || s.om.wind_kt === undefined) return false;
      return s.om.wind_kt >= spd.min && s.om.wind_kt < spd.max && inSector(s.om.direction, sec);
    });
    var omVals  = filtered.filter(function(s){ return s.delta       && s.delta.wind_kt       !== null; });
    var arVals  = filtered.filter(function(s){ return s.delta_arome && s.delta_arome.wind_kt !== null; });
    var maeOm = omVals.length  > 0 ? Math.round(omVals.reduce(function(a,s){ return a + Math.abs(s.delta.wind_kt);       }, 0) / omVals.length  * 10) / 10 : null;
    var maeAr = arVals.length  > 0 ? Math.round(arVals.reduce(function(a,s){ return a + Math.abs(s.delta_arome.wind_kt); }, 0) / arVals.length  * 10) / 10 : null;
    return { maeOm: maeOm, maeAr: maeAr, n: filtered.length };
  }

  var t = '<table style="width:100%;border-collapse:collapse;font-size:0.6rem">';
  t += '<tr><th style="padding:3px;color:var(--muted);text-align:left;font-weight:normal">vel \\ dir</th>';
  sectors.forEach(function(sec){ t += '<th style="padding:3px;color:var(--muted);text-align:center;font-weight:normal">' + sec.label + '</th>'; });
  t += '</tr>';

  speeds.forEach(function(spd) {
    t += '<tr><td style="padding:4px 3px;color:var(--text);white-space:nowrap">' + spd.label + '</td>';
    sectors.forEach(function(sec) {
      var c = cellMAE(spd, sec);
      if (c.n === 0) {
        t += '<td style="padding:3px;text-align:center;color:var(--border)">—</td>';
      } else {
        var winner = (c.maeOm !== null && c.maeAr !== null) ? (c.maeAr < c.maeOm ? 'arome' : c.maeOm < c.maeAr ? 'om' : 'tie') : 'nodata';
        var bg = winner === 'arome' ? 'rgba(10,240,255,0.18)' : winner === 'om' ? 'rgba(255,170,0,0.22)' : 'transparent';
        var border = winner === 'arome' ? '1px solid rgba(10,240,255,0.5)' : winner === 'om' ? '1px solid rgba(255,170,0,0.5)' : '1px solid transparent';
        var omStr = c.maeOm !== null ? '<span style="color:var(--gold)">' + c.maeOm + '</span>' : '—';
        var arStr = c.maeAr !== null ? '<span style="color:var(--accent)">' + c.maeAr + '</span>' : '—';
        t += '<td style="padding:3px;text-align:center;background:' + bg + ';border:' + border + ';border-radius:3px">';
        t += omStr + '<br>' + arStr;
        t += '<div style="color:var(--muted);font-size:0.5rem">n=' + c.n + '</div>';
        t += '</td>';
      }
    });
    t += '</tr>';
  });
  t += '</table>';
  t += '<div style="color:var(--muted);font-size:0.55rem;margin-top:6px">Ambra=MAE OM · Ciano=MAE AROME · sfondo ambra=OM pi\u00f9 preciso · sfondo ciano=AROME pi\u00f9 preciso · n=campioni nella cella</div>';
  el.innerHTML = t;
}


load();
loadObs();

async function loadObs() {
  var el = document.getElementById('obs-list');
  try {
    var r = await fetch(ENGINE_URL + '?action=obs_list&limit=100&k=' + SECRET);
    var d = await r.json();
    var obs = d.observations || [];

    if (obs.length === 0) {
      el.innerHTML = '<div style="font-family:DM Mono,monospace;font-size:0.6rem;color:var(--muted)">Nessuna osservazione ancora inserita.</div>';
      return;
    }

    // Summary
    var pins = [...new Set(obs.map(function(o){ return o.pin; }))];
    document.getElementById('obs-count').textContent = obs.length;
    document.getElementById('obs-pins').textContent = pins.length;
    document.getElementById('obs-summary').style.display = 'block';

    // Tabella
    var html = '<div style="overflow-x:auto">';
    html += '<table style="width:100%;border-collapse:collapse;font-family:DM Mono,monospace;font-size:0.55rem">';
    html += '<thead><tr style="border-bottom:1px solid var(--border);color:var(--muted)">';
    html += '<th style="padding:6px 4px;text-align:left">Ora</th>';
    html += '<th style="padding:6px 4px;text-align:left">Pin</th>';
    html += '<th style="padding:6px 4px;text-align:left">Posizione</th>';
    html += '<th style="padding:6px 4px;text-align:center">Obs<br>kt / °</th>';
    html += '<th style="padding:6px 4px;text-align:center;color:var(--gold)">OM<br>kt / °</th>';
    html += '<th style="padding:6px 4px;text-align:center">Δ vel<br>kt</th>';
    html += '<th style="padding:6px 4px;text-align:center">Δ dir<br>°</th>';
    html += '<th style="padding:6px 4px;text-align:left;color:var(--muted)">Nota</th>';
    html += '</tr></thead><tbody>';

    obs.forEach(function(o) {
      var dt = new Date(o.ts);
      var dtStr = dt.toLocaleDateString('it-IT', {day:'2-digit',month:'2-digit'}) + ' ' +
                  dt.toLocaleTimeString('it-IT', {hour:'2-digit',minute:'2-digit'});
      var omKt  = o.om ? o.om.wind_kt  : null;
      var omDir = o.om ? o.om.direction : null;

      // Delta velocità
      var dv = (omKt !== null) ? Math.round((o.wind_kt - omKt) * 10) / 10 : null;
      var dvStr = dv !== null ? (dv >= 0 ? '+' + dv : '' + dv) : '—';
      var dvCol = dv === null ? 'var(--muted)' : Math.abs(dv) < 2 ? 'var(--safe)' : Math.abs(dv) < 5 ? 'var(--gold)' : 'var(--danger)';

      // Delta direzione (circolare)
      var dd = null;
      if (omDir !== null && omDir !== undefined) {
        dd = o.direction - omDir;
        if (dd > 180) dd -= 360;
        if (dd < -180) dd += 360;
        dd = Math.round(dd);
      }
      var ddStr = dd !== null ? (dd >= 0 ? '+' + dd : '' + dd) + '°' : '—';
      var ddCol = dd === null ? 'var(--muted)' : Math.abs(dd) < 20 ? 'var(--safe)' : Math.abs(dd) < 45 ? 'var(--gold)' : 'var(--danger)';

      // Colore riga per età
      var ageMin = Math.round((Date.now() - dt.getTime()) / 60000);
      var rowOpacity = ageMin > 360 ? '0.5' : '1';

      html += '<tr style="border-bottom:1px solid rgba(26,58,92,0.4);opacity:' + rowOpacity + '">';
      html += '<td style="padding:5px 4px;color:var(--text)">' + dtStr + '</td>';
      html += '<td style="padding:5px 4px"><span style="background:rgba(255,149,0,0.15);color:#ff9500;border:1px solid rgba(255,149,0,0.4);border-radius:4px;padding:1px 5px">' + o.pin + '</span></td>';
      html += '<td style="padding:5px 4px;color:var(--muted)">' + o.lat.toFixed(3) + ',' + o.lon.toFixed(3) + '</td>';
      html += '<td style="padding:5px 4px;text-align:center;color:var(--white)">' + o.wind_kt + ' / ' + o.direction + '°</td>';
      html += '<td style="padding:5px 4px;text-align:center;color:var(--gold)">' + (omKt !== null ? omKt + ' / ' + omDir + '°' : '—') + '</td>';
      html += '<td style="padding:5px 4px;text-align:center;color:' + dvCol + '">' + dvStr + '</td>';
      html += '<td style="padding:5px 4px;text-align:center;color:' + ddCol + '">' + ddStr + '</td>';
      html += '<td style="padding:5px 4px;color:var(--muted);font-size:0.5rem">' + (o.note || '') + '</td>';
      html += '</tr>';
    });

    html += '</tbody></table></div>';
    html += '<div style="font-family:DM Mono,monospace;font-size:0.5rem;color:var(--muted);margin-top:8px">Verde=Δ&lt;2kt/20° · Ambra=Δ&lt;5kt/45° · Rosso=Δ maggiore · Righe sbiadite=&gt;6h fa</div>';
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = '<div style="font-family:DM Mono,monospace;font-size:0.6rem;color:var(--danger)">Errore caricamento osservazioni: ' + e.message + '</div>';
  }
}
</script>
