<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#020e1c">
<title>NAUTILUS Simulator v1.9</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#020e1c;--card:#06182e;--border:#1a3a5c;
  --accent:#0af0ff;--gold:#ffaa00;--safe:#00e676;
  --danger:#ff2d2d;--muted:#4a7a9b;--white:#e8f4ff;--text:#c8dff0;
}
html,body{min-height:100%;background:var(--bg);font-family:'DM Mono',monospace;color:var(--text)}
#nav{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:48px;background:rgba(2,14,28,0.97);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
#nav-logo{font-family:'Bebas Neue',cursive;font-size:1.4rem;color:var(--white);letter-spacing:0.12em}
#nav-logo span{color:var(--accent)}
#nav-ver{font-size:0.5rem;color:#fff;margin-left:8px}
#nav-back{font-size:0.6rem;color:var(--muted);text-decoration:none;letter-spacing:0.1em;border:1px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer}
#nav-back:hover{color:var(--accent);border-color:var(--accent)}
#content{padding:16px;max-width:900px;margin:0 auto}
.section-title{font-size:0.6rem;color:var(--accent);letter-spacing:0.15em;text-transform:uppercase;margin:20px 0 10px;border-bottom:1px solid var(--border);padding-bottom:6px}

.pilot-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:20px}
.pilot-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.pilot-name{font-size:1rem;color:var(--white);font-weight:bold}
.pilot-type{font-size:0.5rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-top:2px}

/* Semaforo */
.semaforo{display:flex;flex-direction:column;align-items:center;gap:3px}
.sem-light{width:14px;height:14px;border-radius:50%;border:1px solid rgba(255,255,255,0.15)}
.sem-red{background:#ff2d2d}
.sem-yellow{background:#ffaa00}
.sem-green{background:#00e676}
.sem-off{background:rgba(255,255,255,0.06)}
.sem-label{font-size:0.42rem;color:var(--white);text-align:center;margin-top:2px}

/* Tabella spiegazione */
.sim-table{width:100%;border-collapse:collapse;font-size:0.6rem;margin-bottom:12px}
.sim-table th{padding:5px 10px;color:var(--muted);text-align:left;border-bottom:1px solid var(--border);font-weight:normal;font-size:0.5rem;text-transform:uppercase;letter-spacing:0.06em}
.sim-table td{padding:7px 10px;border-bottom:1px solid rgba(26,58,92,0.3);vertical-align:top}
.sim-table td:first-child{color:var(--muted);font-size:0.52rem;white-space:nowrap;width:38%}
.sim-table td:last-child{color:var(--white);font-weight:500}
.sim-table tr.highlight td{background:rgba(10,240,255,0.05)}
.sim-table tr.highlight-om td{background:rgba(255,170,0,0.05)}
.sim-table tr.result td{background:rgba(0,230,118,0.06)}
.sim-table tr.result td:last-child{font-size:0.75rem;font-weight:bold;color:var(--safe)}
.sim-table tr:last-child td{border-bottom:none}
.tag{display:inline-block;font-size:0.45rem;padding:1px 5px;border-radius:3px;margin-left:6px;vertical-align:middle}
.tag-arome{background:rgba(10,240,255,0.15);color:var(--accent);border:1px solid rgba(10,240,255,0.4)}
.tag-om{background:rgba(255,170,0,0.15);color:var(--gold);border:1px solid rgba(255,170,0,0.4)}
.tag-oi{background:rgba(0,230,118,0.12);color:var(--safe);border:1px solid rgba(0,230,118,0.3)}

/* Griglie celle */
.grids-wrap{margin-top:12px}
.grid-title{font-size:0.5rem;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:5px}
.cells-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin-bottom:10px}
.cell-mini{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:4px;text-align:center;font-size:0.48rem}
.cell-mini.win-arome{border-color:rgba(10,240,255,0.4);background:rgba(10,240,255,0.06)}
.cell-mini.win-om{border-color:rgba(255,170,0,0.4);background:rgba(255,170,0,0.06)}
.cell-mini.current{box-shadow:0 0 0 2px var(--white)}
.cell-key{color:var(--muted);font-size:0.42rem}
.cell-n{font-weight:bold}
.cell-best{font-size:0.4rem}

.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap');
</style>
</head>
<body>
<div id="nav">
  <div style="display:flex;align-items:center">
    <div id="nav-logo">NAUTI<span>LUS</span></div>
    <div id="nav-ver">simulator v1.9</div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <button id="btn-export" onclick="exportSimulatorXLS()" style="font-family:'DM Mono',monospace;font-size:0.55rem;padding:5px 10px;background:transparent;border:1px solid var(--accent);color:var(--accent);border-radius:6px;cursor:pointer;letter-spacing:0.06em">↓ XLS</button>
    <a id="nav-back" href="#" onclick="event.preventDefault();var p=prompt('Password:');if(p==='mdi'){window.location.href='/?k=mdi'}">APP</a>
  </div>
</div>
<div id="content">
  <div class="section-title">Simulatore — spiegazione valori mappa</div>
  <div style="font-size:0.55rem;color:var(--muted);margin-bottom:16px">Per ogni punto pilota: da dove vengono i dati, quale correzione viene applicata, qual è il valore finale che apparirà sulla mappa.</div>
  <div id="pilots-container"><div style="text-align:center;padding:40px;color:var(--muted)"><div class="spinner"></div><br><br>Caricamento...</div></div>
  <div style="font-size:0.48rem;color:var(--muted);margin-top:12px;padding-top:10px;border-top:1px solid var(--border)">🔴 n=0-2 dati scarsi · 🟡 n=3-9 tendenza · 🟢 n≥10 affidabile</div>
</div>

<script>
var ENGINE_URL = '/api/engine';
var SECRET = 'mdi';
var OI_MAX_KM = 40;
var OI_MIN_STATIONS = 2;
var OI_EXCLUDED = { bonifacio_pertusato: true, vada: true };

var PILOTS = [
  { id:'gorgona_cfr',    name:'Gorgona CFR',      type:'AROME previsto vincitore', lat:43.433, lon:9.883  },
  { id:'bocca_arno_cfr', name:'Bocca d\'Arno CFR', type:'OM previsto vincitore',   lat:43.680, lon:10.270 },
  { id:'viareggio',      name:'Viareggio',          type:'Borderline — ibrido',    lat:43.870, lon:10.230 }
];

var SPEED_LABELS  = { low:'< 8 kt', mid:'8-15 kt', high:'> 15 kt' };
var SECTOR_LABELS = { N:'Nord', E:'Est', S:'Sud', W:'Ovest' };
var SLOT_LABELS   = { morning:'Mattina (6-14h)', afternoon:'Pomeriggio (14-24h)' };

function semaforo(n) {
  if (n <= 2) return { color:'red',    label:'Dati scarsi', css:'var(--danger)' };
  if (n <= 9) return { color:'yellow', label:'Tendenza',    css:'var(--gold)'   };
  return             { color:'green',  label:'Affidabile',  css:'var(--safe)'   };
}

function renderSemaforo(n) {
  var s = semaforo(n);
  return '<div class="semaforo">' +
    '<div class="sem-light ' + (s.color==='green'  ? 'sem-green'  : 'sem-off') + '"></div>' +
    '<div class="sem-light ' + (s.color==='yellow' ? 'sem-yellow' : 'sem-off') + '"></div>' +
    '<div class="sem-light ' + (s.color==='red'    ? 'sem-red'    : 'sem-off') + '"></div>' +
    '<div class="sem-label" style="color:' + s.css + '">' + s.label + '</div></div>';
}

function degToRad(d){ return d * Math.PI / 180; }
function haversineKm(lat1,lon1,lat2,lon2){
  var R=6371,dLat=degToRad(lat2-lat1),dLon=degToRad(lon2-lon1);
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(degToRad(lat1))*Math.cos(degToRad(lat2))*Math.sin(dLon/2)*Math.sin(dLon/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function computeOI(pilotLat, pilotLon, pilotOmSpeed, stations, biasMatrix) {
  // Per ogni stazione, determina il bias da usare
  var stBiases = [];
  Object.keys(stations).forEach(function(id) {
    if (OI_EXCLUDED[id]) return;
    var st = stations[id];
    if (st.wind_kt === null || st.wind_kt === undefined) return;
    var d = haversineKm(pilotLat, pilotLon, st.lat, st.lon);
    if (d > OI_MAX_KM) return;
    // Bias = stazione - OM locale
    var bias = st.om_wind_kt !== null ? st.wind_kt - st.om_wind_kt : null;
    if (bias === null || Math.abs(bias) > 15) return;
    var reliability = 0.5;
    if (biasMatrix && biasMatrix[id] && biasMatrix[id].reliability_weight) {
      reliability = biasMatrix[id].reliability_weight;
    }
    if (d < 0.5) d = 0.5;
    var w = (1/(d*d)) * reliability;
    stBiases.push({ id:id, d:Math.round(d), bias:bias, w:w, reliability:reliability, wind_kt:st.wind_kt });
  });
  if (stBiases.length < OI_MIN_STATIONS) return { correction: null, stations_used: stBiases, reason: 'Stazioni insufficienti nel raggio ' + OI_MAX_KM + 'km' };
  var sumW = stBiases.reduce(function(a,s){ return a+s.w; }, 0);
  var sumBW = stBiases.reduce(function(a,s){ return a+s.bias*s.w; }, 0);
  var corr = sumBW / sumW;
  corr = Math.max(-5, Math.min(5, corr));
  return { correction: Math.round(corr*10)/10, stations_used: stBiases, reason: null };
}

function renderPilot(pilot, omData, scoreData, biasMatrixData, stationsData) {
  var score = scoreData ? scoreData.score : null;
  var matrix = score ? score.matrix : null;
  var biasMatrix = biasMatrixData ? biasMatrixData.stations : null;

  // Condizioni correnti
  var omSpeed = omData ? omData.wind_kt : null;
  var omDir   = omData ? omData.direction : null;
  var omGust  = omData ? omData.gust_kt : null;
  var slot    = ((new Date().getUTCHours()+2)%24) >= 6 && ((new Date().getUTCHours()+2)%24) < 14 ? 'morning' : 'afternoon';
  var spdKey  = omSpeed===null ? null : omSpeed<8 ? 'low' : omSpeed<15 ? 'mid' : 'high';
  var secKey  = omDir===null   ? null : (omDir>=315||omDir<45)?'N':omDir<135?'E':omDir<225?'S':'W';
  var currentKey = spdKey && secKey ? spdKey+'_'+secKey+'_'+slot : null;
  var currentCell = matrix && currentKey ? matrix[currentKey] : null;
  var currentN = currentCell ? currentCell.n : 0;
  var sem = semaforo(currentN);

  // Modello scelto
  var chosen = currentCell ? currentCell.best : (score && score.global ? score.global.best : null);
  var fallback = !currentCell || currentCell.n === 0;
  var maeOm  = currentCell ? currentCell.mae_om    : (score && score.global ? score.global.mae_om    : null);
  var maeAr  = currentCell ? currentCell.mae_arome : (score && score.global ? score.global.mae_arome : null);
  var chosenMae = chosen === 'arome' ? maeAr : maeOm;
  var chosenColor = chosen === 'arome' ? 'var(--accent)' : chosen === 'om' ? 'var(--gold)' : 'var(--muted)';

  // Bias dalla bias_matrix per questo punto nelle condizioni correnti
  var biasBm = null;
  if (biasMatrix && biasMatrix[pilot.id]) {
    var bm = biasMatrix[pilot.id];
    if (currentKey && bm.matrix && bm.matrix[currentKey] && bm.matrix[currentKey].n >= 5) {
      biasBm = bm.matrix[currentKey].bias_preferred;
    } else {
      biasBm = bm.global_bias_preferred !== undefined ? bm.global_bias_preferred : null;
    }
  }

  // Calcolo OI
  var oiResult = stationsData ? computeOI(pilot.lat, pilot.lon, omSpeed, stationsData, biasMatrix) : null;
  var oiCorrection = oiResult ? oiResult.correction : null;

  // Dato stazione reale per questo punto pilota
  var stReal = stationsData ? stationsData[pilot.id] : null;
  var stSpeed = stReal ? stReal.wind_kt : null;
  var stDir   = stReal ? stReal.direction : null;
  var stAgeMin = stReal ? stReal.age_min : null;

  // Valore finale — parte da OM, corretto da OI
  var finalSpeed = omSpeed !== null ? omSpeed : null;
  if (finalSpeed !== null && oiCorrection !== null) finalSpeed = Math.round(Math.max(0, finalSpeed + oiCorrection) * 10) / 10;
  else if (finalSpeed !== null && biasBm !== null) finalSpeed = Math.round(Math.max(0, finalSpeed + biasBm) * 10) / 10;

  // Salva i dati calcolati per l'export XLS (2026-07-10)
  window._simExportData = window._simExportData || {};
  window._simExportData[pilot.id] = {
    pilot: pilot, omSpeed: omSpeed, omDir: omDir, omGust: omGust,
    slot: slot, spdKey: spdKey, secKey: secKey, currentKey: currentKey,
    currentN: currentN, chosen: chosen, fallback: fallback,
    maeOm: maeOm, maeAr: maeAr, biasBm: biasBm,
    oiResult: oiResult, oiCorrection: oiCorrection,
    stSpeed: stSpeed, stDir: stDir, stAgeMin: stAgeMin,
    stSource: stReal ? stReal.source : null,
    finalSpeed: finalSpeed, matrix: matrix
  };

  var html = '<div class="pilot-card">';

  // Header
  html += '<div class="pilot-header">';
  html += '<div><div class="pilot-name">' + pilot.name + '</div><div class="pilot-type">' + pilot.type + '</div></div>';
  html += renderSemaforo(currentN);
  html += '</div>';

  // Tabella spiegazione
  html += '<table class="sim-table">';
  html += '<thead><tr><th>Passaggio</th><th>Valore / Spiegazione</th></tr></thead><tbody>';

  // 1. Dato stazione reale
  html += '<tr><td>1. Stazione reale</td><td>';
  if (stSpeed !== null) {
    html += '<b style="color:var(--white)">' + stSpeed + ' kt</b>';
    if (stDir !== null) html += ' · ' + stDir + '° (' + ((stDir>=315||stDir<45)?'N':stDir<135?'E':stDir<225?'S':'W') + ')';
    if (stAgeMin !== null) html += '<br><span style="font-size:0.48rem;color:' + (stAgeMin>60?'var(--danger)':stAgeMin>30?'var(--gold)':'var(--safe)') + '">' + stAgeMin + ' min fa</span>';
    html += '<span style="font-size:0.48rem;color:var(--muted)"> — fonte: ' + (stReal.source || 'bias_samples') + '</span>';
  } else {
    html += '<span style="color:var(--muted)">Nessun dato recente disponibile</span>';
    html += '<br><span style="font-size:0.48rem;color:var(--muted)">Il sistema userà solo il modello senza ancora di verità</span>';
  }
  html += '</td></tr>';

  // 2. OM per confronto e classificazione
  html += '<tr><td>2. OM (confronto)</td><td>';
  if (omSpeed !== null) {
    html += omSpeed + ' kt · ' + (omDir !== null ? omDir + '° (' + (secKey||'?') + ')' : '?');
    if (omGust) html += ' · raffica ' + omGust + ' kt';
    if (stSpeed !== null) {
      var stOmDiff = Math.round((stSpeed - omSpeed)*10)/10;
      html += '<br><span style="font-size:0.5rem;color:' + (Math.abs(stOmDiff)<1?'var(--safe)':Math.abs(stOmDiff)<3?'var(--gold)':'var(--danger)') + '">Stazione vs OM: ' + (stOmDiff>=0?'+':'') + stOmDiff + ' kt</span>';
    }
  } else { html += '—'; }
  html += '<br><span style="font-size:0.48rem;color:var(--muted)">Usato per classificare le condizioni → selezione cella matrice</span>';
  html += '</td></tr>';

  // 3. Condizioni → selezione cella
  html += '<tr><td>3. Condizioni attuali</td><td>';
  html += (spdKey ? SPEED_LABELS[spdKey] : '—') + ' · ' + (secKey ? SECTOR_LABELS[secKey] : '—') + ' · ' + SLOT_LABELS[slot];
  html += '<br><span style="font-size:0.48rem;color:var(--muted)">Cella selezionata: ' + (currentKey || '—') + '</span>';
  html += '</td></tr>';

  // 4. Modello scelto
  html += '<tr class="' + (chosen==='arome'?'highlight':'highlight-om') + '"><td>4. Modello scelto</td><td>';
  html += '<span style="color:' + chosenColor + ';font-weight:bold">' + (chosen ? chosen.toUpperCase() : '—') + '</span>';
  if (chosen) html += '<span class="tag ' + (chosen==='arome'?'tag-arome':'tag-om') + '">' + (fallback ? 'fallback globale' : 'cella n='+currentN) + '</span>';
  if (maeOm && maeAr) {
    html += '<br><span style="font-size:0.5rem;color:var(--white)">MAE cella: OM ' + (maeOm||'—') + ' kt · AROME ' + (maeAr||'—') + ' kt</span>';
    html += '<br><span style="font-size:0.48rem;color:var(--muted)">' + (chosen==='arome'?'AROME sbaglia meno in queste condizioni':'OM sbaglia meno in queste condizioni') + '</span>';
  }
  html += '</td></tr>';

  // 5. Correzione OI (usa stazione reale come ancora)
  html += '<tr><td>5. Correzione OI</td><td>';
  if (oiResult && oiCorrection !== null) {
    html += '<span class="tag tag-oi">OI attivo</span> ' + (oiCorrection >= 0 ? '+' : '') + oiCorrection + ' kt';
    html += '<br><span style="font-size:0.48rem;color:var(--muted)">Bias ponderato da ' + oiResult.stations_used.length + ' stazioni nel raggio ' + OI_MAX_KM + 'km:</span>';
    oiResult.stations_used.slice(0,3).forEach(function(st){
      html += '<br><span style="font-size:0.46rem;color:var(--text)">· ' + st.id + ' (' + st.d + 'km) bias=' + (st.bias>=0?'+':'') + Math.round(st.bias*10)/10 + 'kt w=' + Math.round(st.reliability*100)/100 + '</span>';
    });
    if (oiResult.stations_used.length > 3) html += '<br><span style="font-size:0.46rem;color:var(--muted)">+ altre ' + (oiResult.stations_used.length-3) + ' stazioni</span>';
  } else if (oiResult && oiResult.reason) {
    html += '<span style="color:var(--muted)">Non applicata — ' + oiResult.reason + '</span>';
  } else {
    html += '<span style="color:var(--muted)">Dati stazioni non disponibili</span>';
  }
  html += '</td></tr>';

  // 6. Valore finale mappa
  html += '<tr class="result"><td>6. Valore finale mappa</td><td>';
  html += finalSpeed !== null ? '<b>' + finalSpeed + ' kt</b>' : '—';
  if (omSpeed !== null && finalSpeed !== null && finalSpeed !== omSpeed) {
    var delta = Math.round((finalSpeed - omSpeed)*10)/10;
    html += ' <span style="font-size:0.55rem;color:' + (Math.abs(delta)<1?'var(--safe)':Math.abs(delta)<3?'var(--gold)':'var(--danger)') + '">(' + (delta>=0?'+':'') + delta + ' kt vs OM)</span>';
  }
  if (stSpeed !== null && finalSpeed !== null) {
    var stFinalDiff = Math.round((finalSpeed - stSpeed)*10)/10;
    html += '<br><span style="font-size:0.5rem;color:' + (Math.abs(stFinalDiff)<1?'var(--safe)':Math.abs(stFinalDiff)<3?'var(--gold)':'var(--danger)') + '">vs stazione reale: ' + (stFinalDiff>=0?'+':'') + stFinalDiff + ' kt</span>';
  }
  html += '<br><span style="font-size:0.48rem;color:var(--muted)">Questo è il valore sulla mappa con OI attivo</span>';
  html += '</td></tr>';

  html += '</tbody></table>';

  // Griglie celle — mattina e pomeriggio
  if (matrix) {
    html += '<div class="grids-wrap">';
    ['morning','afternoon'].forEach(function(sl){
      var isCurr = sl === slot;
      html += '<div class="grid-title" style="color:' + (isCurr?'var(--white)':'var(--muted)') + '">' + SLOT_LABELS[sl] + (isCurr?' ◀ ora':'') + '</div>';
      html += '<div class="cells-grid">';
      ['low','mid','high'].forEach(function(spd){
        ['N','E','S','W'].forEach(function(sec){
          var key = spd+'_'+sec+'_'+sl;
          var cell = matrix[key];
          var n = cell ? cell.n : 0;
          var best = cell ? cell.best : null;
          var isCurrent = key === currentKey;
          var cls = 'cell-mini' + (best==='arome'?' win-arome':best==='om'?' win-om':'') + (isCurrent?' current':'');
          var spdShort = spd==='low'?'<8':spd==='mid'?'8-15':'>15';
          html += '<div class="' + cls + '">';
          html += '<div class="cell-key">' + spdShort + ' ' + sec + '</div>';
          html += '<div class="cell-n" style="color:' + (n===0?'var(--muted)':n<3?'var(--gold)':'var(--white)') + '">' + n + '</div>';
          html += '<div class="cell-best" style="color:' + (best==='arome'?'var(--accent)':best==='om'?'var(--gold)':'var(--muted)') + '">' + (best?best.toUpperCase():'—') + '</div>';
          html += '</div>';
        });
      });
      html += '</div>';
    });
    html += '</div>';
  }

  html += '</div>';
  return html;
}

function exportSimulatorXLS() {
  var data = window._simExportData || {};
  if (Object.keys(data).length === 0) { alert('Dati non ancora caricati, riprova tra qualche secondo.'); return; }
  var wb = XLSX.utils.book_new();
  var now = new Date();
  var nowStr = now.toLocaleString('it-IT',{timeZone:'Europe/Rome'});

  // --- FOGLIO 1: RIEPILOGO ---
  var rows1 = [['Generato il', nowStr],[],
    ['Stazione','Tipo','ST kt','ST dir','ST eta (min)','ST fonte','OM kt','OM dir','OM raffica',
     'Cella condizioni','N campioni cella','Modello scelto','Fallback globale','MAE OM cella','MAE AROME cella',
     'Bias matrix (kt)','Correzione OI (kt)','N stazioni OI','Valore finale (kt)','Delta vs OM','Delta vs stazione reale']];
  PILOTS.forEach(function(p){
    var d = data[p.id];
    if (!d) return;
    var deltaOm = (d.finalSpeed!=null && d.omSpeed!=null) ? Math.round((d.finalSpeed-d.omSpeed)*10)/10 : null;
    var deltaSt = (d.finalSpeed!=null && d.stSpeed!=null) ? Math.round((d.finalSpeed-d.stSpeed)*10)/10 : null;
    rows1.push([
      p.name, p.type, d.stSpeed, d.stDir, d.stAgeMin, d.stSource,
      d.omSpeed, d.omDir, d.omGust,
      d.currentKey, d.currentN, d.chosen, d.fallback ? 'SI' : 'NO', d.maeOm, d.maeAr,
      d.biasBm, d.oiCorrection, d.oiResult ? d.oiResult.stations_used.length : 0,
      d.finalSpeed, deltaOm, deltaSt
    ]);
  });
  var ws1 = XLSX.utils.aoa_to_sheet(rows1);
  ws1['!cols'] = Array(21).fill({wch:14});
  XLSX.utils.book_append_sheet(wb, ws1, 'Riepilogo');

  // --- FOGLIO 2: DETTAGLIO OI (stazioni usate nella correzione, per pilota) ---
  var rows2 = [['Stazione pilota','ID stazione usata','Distanza (km)','Bias (kt)','Peso (reliability)','Vento stazione (kt)']];
  PILOTS.forEach(function(p){
    var d = data[p.id];
    if (!d || !d.oiResult || !d.oiResult.stations_used.length) return;
    d.oiResult.stations_used.forEach(function(st){
      rows2.push([p.name, st.id, st.d, st.bias, st.reliability, st.wind_kt]);
    });
  });
  var ws2 = XLSX.utils.aoa_to_sheet(rows2);
  ws2['!cols'] = [{wch:18},{wch:18},{wch:12},{wch:10},{wch:14},{wch:16}];
  XLSX.utils.book_append_sheet(wb, ws2, 'Dettaglio OI');

  // --- FOGLIO 3: MATRICE CELLE (n campioni + modello vincente, per pilota/slot/cella) ---
  var rows3 = [['Stazione pilota','Slot','Fascia velocita','Settore','N campioni','Modello vincente','MAE OM','MAE AROME']];
  PILOTS.forEach(function(p){
    var d = data[p.id];
    if (!d || !d.matrix) return;
    ['morning','afternoon'].forEach(function(sl){
      ['low','mid','high'].forEach(function(spd){
        ['N','E','S','W'].forEach(function(sec){
          var key = spd+'_'+sec+'_'+sl;
          var cell = d.matrix[key];
          rows3.push([p.name, sl, spd, sec, cell?cell.n:0, cell?cell.best:'--', cell?cell.mae_om:null, cell?cell.mae_arome:null]);
        });
      });
    });
  });
  var ws3 = XLSX.utils.aoa_to_sheet(rows3);
  ws3['!cols'] = [{wch:18},{wch:12},{wch:12},{wch:8},{wch:10},{wch:14},{wch:10},{wch:12}];
  XLSX.utils.book_append_sheet(wb, ws3, 'Matrice celle');

  XLSX.writeFile(wb, 'nautilus_simulator_' + now.toISOString().slice(0,16).replace(/[:T]/g,'-') + '.xlsx');
}

async function load() {
  try {
    var idxNow = (new Date().getUTCHours()+2)%24;

    // Carica tutto in parallelo
    var [snapshotRes, biasMatrixRes, ...pilotResults] = await Promise.all([
      fetch(ENGINE_URL + '?action=stations_snapshot&k=' + SECRET).then(function(r){ return r.json(); }).catch(function(){ return null; }),
      fetch(ENGINE_URL + '?action=bias_matrix&k=' + SECRET).then(function(r){ return r.json(); }).catch(function(){ return null; }),
      ...PILOTS.map(function(p){
        return Promise.all([
          fetch(ENGINE_URL + '?action=score_get&station=' + p.id + '&k=' + SECRET).then(function(r){ return r.json(); }).catch(function(){ return null; }),
          fetch(ENGINE_URL + '?action=meteo&lat=' + p.lat + '&lon=' + p.lon).then(function(r){ return r.json(); }).catch(function(){ return null; })
        ]);
      })
    ]);

    var stationsData = snapshotRes ? snapshotRes.stations : null;

    var html = '';
    PILOTS.forEach(function(pilot, i) {
      var scoreData = pilotResults[i][0];
      var meteoRaw  = pilotResults[i][1];
      var omData = meteoRaw && meteoRaw.atm && meteoRaw.atm.hourly && meteoRaw.atm.hourly.windspeed_10m ? {
        wind_kt:   meteoRaw.atm.hourly.windspeed_10m[idxNow]  || null,
        gust_kt:   meteoRaw.atm.hourly.windgusts_10m  ? meteoRaw.atm.hourly.windgusts_10m[idxNow]  : null,
        direction: meteoRaw.atm.hourly.winddirection_10m ? meteoRaw.atm.hourly.winddirection_10m[idxNow] : null
      } : null;
      html += renderPilot(pilot, omData, scoreData, biasMatrixRes, stationsData);
    });
    document.getElementById('pilots-container').innerHTML = html;
  } catch(e) {
    document.getElementById('pilots-container').innerHTML = '<div style="color:var(--danger);font-size:0.6rem">Errore: ' + e.message + '</div>';
  }
}

load();
</script>
